[pytest]
# Pytest Configuration for AgentCore CDK Infrastructure

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Coverage settings
addopts = 
    --verbose
    --strict-markers
    --cov=cdk
    --cov=runtime
    --cov=cli
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=80

# Markers for test categorization
markers =
    unit: Unit tests for individual components
    integration: Integration tests requiring AWS resources
    property: Property-based tests using Hypothesis
    slow: Tests that take significant time to run

# Hypothesis settings for property-based testing
# These are defaults; individual tests can override with @settings decorator

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    error
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
